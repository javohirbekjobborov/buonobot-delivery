<!DOCTYPE html>
<html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kuryer Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--green:#16a34a;--bg:#f0fdf4;--card:#fff;--gray:#6b7280;--border:#d1fae5;--r:14px}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:#1e293b;min-height:100vh}.hidden{display:none!important}.header{background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}.header-title{font-size:17px;font-weight:800}.online-dot{width:8px;height:8px;background:#86efac;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border)}.tab{flex:1;padding:13px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border:none;background:none;border-bottom:3px solid transparent}.tab.active{color:var(--green);border-bottom-color:var(--green)}.page{padding:12px 14px 20px}.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);margin-bottom:12px;border-radius:10px;overflow:hidden}.stat-box{background:#fff;padding:12px;text-align:center}.stat-n{font-size:22px;font-weight:800;color:var(--green)}.stat-l{font-size:10px;color:var(--gray);margin-top:2px}.order-card{background:var(--card);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}.order-top{padding:12px}.order-hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.order-num{font-weight:800;font-size:15px}.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}.chip-accepted{background:#dbeafe;color:#1e40af}.chip-on_way{background:#d1fae5;color:#065f46}.info-row{display:flex;align-items:center;gap:7px;font-size:13px;margin-bottom:5px}.info-icon{width:18px;text-align:center;font-size:15px}.items-box{background:#f8fafc;border-radius:8px;padding:9px 11px;margin-top:8px}.item-ln{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}.item-ln:last-child{margin:0;padding-top:7px;border-top:1px solid #e5e7eb;font-weight:700}.order-map{height:190px}.actions{padding:10px 12px;display:flex;gap:8px}.action-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer}.btn-nav{background:#3b82f6;color:#fff}.btn-call{background:#f59e0b;color:#fff}.btn-pickup{background:#8b5cf6;color:#fff}.btn-deliver{background:var(--green);color:#fff}.empty{text-align:center;padding:50px 20px;color:var(--gray)}.empty-icon{font-size:50px;margin-bottom:12px}.empty h3{font-size:16px;font-weight:700;color:#374151}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;transition:.3s;opacity:0;z-index:999}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}</style></head>
<body>
<div class="header"><div class="header-title"><span class="online-dot"></span>Kuryer Panel</div><span id="courierName" style="font-size:13px"></span></div>
<div class="tabs"><button class="tab active" onclick="showTab('active',this)">🔥 Faol</button><button class="tab" onclick="showTab('history',this)">📋 Tarix</button></div>
<div id="tab-active" class="page"><div class="stats-bar"><div class="stat-box"><div class="stat-n" id="st-a">-</div><div class="stat-l">Faol</div></div><div class="stat-box"><div class="stat-n" id="st-t">-</div><div class="stat-l">Bugun</div></div><div class="stat-box"><div class="stat-n" id="st-e">-</div><div class="stat-l">Daromad</div></div></div><div id="activeOrders"></div></div>
<div id="tab-history" class="page hidden"><div id="historyOrders"></div></div>
<div class="toast" id="toast"></div>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.expand();tg.setHeaderColor('#16a34a');}
const cid=tg?.initDataUnsafe?.user?.id?String(tg.initDataUnsafe.user.id):'';
const H={'Content-Type':'application/json','x-telegram-id':cid};
let orders=[],maps={};

async function loadOrders(){orders=await fetch('/api/courier/orders',{headers:H}).then(r=>r.json()).catch(()=>[]);renderActive();updateStats();}
function updateStats(){const a=orders.filter(o=>['accepted','on_way'].includes(o.status));document.getElementById('st-a').textContent=a.length;document.getElementById('st-t').textContent=orders.length;const e=orders.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.total*0.1),0);document.getElementById('st-e').textContent=Math.round(e/1000)+'K';}
function renderActive(){const a=orders.filter(o=>['accepted','on_way'].includes(o.status));document.getElementById('activeOrders').innerHTML=a.length?a.map(o=>cardHtml(o)).join(''):'<div class="empty"><div class="empty-icon">✅</div><h3>Faol buyurtma yoq</h3></div>';a.forEach(o=>{if(o.lat&&o.lng)initMap(o);});}
function cardHtml(o){const ow=o.status==='on_way';const chip=ow?'<span class="chip chip-on_way">🛵 Yolda</span>':'<span class="chip chip-accepted">✅ Qabul</span>';const iHtml=o.items.map(i=>'<div class="item-ln"><span>'+i.name_uz+' x'+i.qty+'</span><span>'+(i.price*i.qty).toLocaleString()+' so\'m</span></div>').join('')+'<div class="item-ln"><span>Jami</span><span>'+o.total.toLocaleString()+' so\'m</span></div>';return '<div class="order-card" id="card-'+o.id+'"><div class="order-top"><div class="order-hrow"><span class="order-num">📦 #'+o.id+'</span>'+chip+'</div><div class="info-row"><span class="info-icon">👤</span><span><b>'+(o.user_name||'-')+'</b></span></div>'+(o.user_phone?'<div class="info-row"><span class="info-icon">📞</span><a href="tel:'+o.user_phone+'" style="color:#3b82f6;font-weight:600">'+o.user_phone+'</a></div>':'')+(o.address?'<div class="info-row"><span class="info-icon">📍</span><span>'+o.address+'</span></div>':'')+'<div class="info-row"><span class="info-icon">💳</span><span>'+(o.payment==='cash'?'Naqd':o.payment==='click'?'Click':'Payme')+'</span></div>'+(o.comment?'<div class="info-row"><span class="info-icon">💬</span><span>'+o.comment+'</span></div>':'')+'<div class="items-box">'+iHtml+'</div></div>'+(o.lat&&o.lng?'<div class="order-map" id="map-'+o.id+'"></div>':'')+'<div class="actions">'+(o.lat&&o.lng?'<button class="action-btn btn-nav" onclick="openNav('+o.lat+','+o.lng+')">🗺 Navigatsiya</button>':'')+(o.user_phone?'<button class="action-btn btn-call" onclick="window.location.href=\'tel:'+o.user_phone+'\'">📞 Qo\'ng\'iroq</button>':'')+(ow?'<button class="action-btn btn-deliver" onclick="upd('+o.id+',\'delivered\')">✅ Yetkazdim</button>':'<button class="action-btn btn-pickup" onclick="upd('+o.id+',\'on_way\')">🛵 Oldim</button>')+'</div></div>';}
function initMap(o){setTimeout(()=>{const el=document.getElementById('map-'+o.id);if(!el||maps[o.id])return;const m=L.map('map-'+o.id).setView([o.lat,o.lng],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);L.marker([o.lat,o.lng],{icon:L.divIcon({html:'📍',className:'',iconSize:[30,30],iconAnchor:[15,30]})}).addTo(m).bindPopup(o.user_name||'').openPopup();maps[o.id]=m;},200);}
function openNav(lat,lng){window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode=driving','_blank');}
async function upd(id,status){const labels={on_way:'Oldim tasdiqlandi!',delivered:'Yetkazildi! Rahmat!'};await fetch('/api/courier/orders/'+id,{method:'PUT',headers:H,body:JSON.stringify({status})});showToast(labels[status]||'Yangilandi');setTimeout(loadOrders,500);}
function showTab(n,btn){document.getElementById('tab-active').classList.add('hidden');document.getElementById('tab-history').classList.add('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+n).classList.remove('hidden');btn.classList.add('active');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
const u=tg?.initDataUnsafe?.user;if(u)document.getElementById('courierName').textContent=u.first_name;
loadOrders();setInterval(loadOrders,20000);
</script></body></html>
