<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buonobot Delivery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; padding: 40px 20px; }
.emoji { font-size: 80px; margin-bottom: 20px; display: block; animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
h1 { font-size: 42px; color: #f39c12; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.subtitle { font-size: 18px; color: #bdc3c7; margin-bottom: 40px; }
.features { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; flex-wrap: wrap; }
.feature { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; min-width: 140px; backdrop-filter: blur(10px); }
.feature-icon { font-size: 36px; display: block; margin-bottom: 8px; }
.feature-text { color: #ecf0f1; font-size: 14px; }
.btn { display: inline-block; background: linear-gradient(135deg, #0088cc, #006fa8); color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-size: 20px; font-weight: bold; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,136,204,0.4); }
.btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,136,204,0.6); }
.status { margin-top: 25px; }
.status-badge { background: #27ae60; color: white; padding: 8px 20px; border-radius: 20px; font-size: 14px; display: inline-block; }
.footer { margin-top: 30px; color: #7f8c8d; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
<span class="emoji">🍔</span>
<h1>Buonobot Delivery</h1>
<p class="subtitle">Tez va sifatli ovqat yetkazib berish xizmati</p>
<div class="features">
<div class="feature"><span class="feature-icon">🚀</span><div class="feature-text">30-45 daqiqada yetkazib berish</div></div>
<div class="feature"><span class="feature-icon">⭐</span><div class="feature-text">Sifatli va yangi taomlar</div></div>
<div class="feature"><span class="feature-icon">💳</span><div class="feature-text">Qulay tolov usullari</div></div>
</div>
<a href="https://t.me/buonobot_delivery_bot" class="btn">🤖 Botni ochish</a>
<div class="status"><span class="status-badge">✅ Bot faol ishlayapti</span></div>
<div class="footer"><p>© 2024 Buonobot Delivery. Barcha huquqlar himoyalangan.</p><p style="margin-top:5px;">📍 Toshkent | ⏰ 09:00 - 23:00 | 📞 +998 90 123 45 67</p></div>
</div>
</body>
</html>
