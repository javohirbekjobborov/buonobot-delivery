<!DOCTYPE html>
<html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Buono Burger</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#e63946;--bg:#f5f5f5;--card:#fff;--text:#1a1a1a;--gray:#6b7280;--border:#e5e7eb;--r:14px}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto}.hidden{display:none!important}.header{background:var(--primary);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100}.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.logo{font-size:18px;font-weight:800}.lang-btn,.cart-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}.cart-btn{display:flex;align-items:center;gap:6px}.cart-count{background:#fff;color:var(--primary);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}.cats{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border)}.cats::-webkit-scrollbar{display:none}.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer}.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.products{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.product-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}.product-img{width:100%;height:130px;object-fit:cover}.product-info{padding:9px}.product-name{font-size:13px;font-weight:700;margin-bottom:2px}.product-desc{font-size:11px;color:var(--gray);margin-bottom:7px}.product-footer{display:flex;align-items:center;justify-content:space-between}.product-price{font-size:13px;font-weight:800;color:var(--primary)}.add-btn{background:var(--primary);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}.qty-ctrl{display:flex;align-items:center;gap:5px}.qty-ctrl button{background:var(--primary);color:#fff;border:none;width:24px;height:24px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}.qty-ctrl span{font-size:13px;font-weight:700;min-width:14px;text-align:center}.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;cursor:pointer;color:var(--gray);font-size:10px;gap:2px;border:none;background:none}.nav-item.active{color:var(--primary)}.nav-item svg{width:20px;height:20px}.page{padding-bottom:68px}.cart-list,.orders-list,.checkout-form{padding:12px 16px}.cart-item{background:#fff;border-radius:var(--r);padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}.cart-item-img{width:55px;height:55px;border-radius:8px;object-fit:cover}.cart-item-info{flex:1}.cart-item-name{font-size:13px;font-weight:700;margin-bottom:4px}.cart-item-price{font-size:12px;color:var(--primary);font-weight:600}.remove-btn{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer}.cart-summary{background:#fff;border-radius:var(--r);padding:14px;margin:0 16px 10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}.summary-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}.summary-row.total{font-weight:800;font-size:15px;border-top:1px solid var(--border);padding-top:8px}.order-btn{display:block;background:var(--primary);color:#fff;border:none;width:calc(100% - 32px);margin:0 16px 14px;padding:14px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}.order-btn:disabled{opacity:.5}.form-group{margin-bottom:12px}.form-label{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;display:block}.form-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--r);font-size:14px;outline:none}.form-input:focus{border-color:var(--primary)}.payment-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.payment-opt{border:2px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer}.payment-opt.selected{border-color:var(--primary);background:#fff5f5}.payment-opt span{display:block;font-size:11px;font-weight:600;margin-top:3px}.payment-opt .icon{font-size:20px}.loc-btn{width:100%;padding:12px;border:2px dashed var(--border);border-radius:var(--r);background:#f9fafb;font-size:13px;cursor:pointer;color:var(--gray);text-align:left;display:flex;align-items:center;gap:8px}.loc-btn.set{border-color:var(--primary);color:var(--primary)}.order-card{background:#fff;border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}.order-header{display:flex;justify-content:space-between;margin-bottom:6px}.order-id{font-weight:800;font-size:14px}.status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}.s-new{background:#fef3c7;color:#92400e}.s-accepted{background:#dbeafe;color:#1e40af}.s-cooking{background:#fce7f3;color:#9d174d}.s-on_way{background:#d1fae5;color:#065f46}.s-delivered{background:#f0fdf4;color:#166534}.order-items{font-size:12px;color:var(--gray);margin-bottom:6px}.order-total{font-weight:700;font-size:14px;color:var(--primary)}.profile-card{background:#fff;border-radius:var(--r);padding:20px;margin:12px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}.avatar{width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}.profile-name{font-size:17px;font-weight:700}.profile-username{color:var(--gray);font-size:13px}.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;transition:.3s;opacity:0;z-index:999}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.empty{text-align:center;padding:50px 20px;color:var(--gray)}.empty-icon{font-size:50px;margin-bottom:12px}.empty h3{font-size:16px;font-weight:700;color:var(--text)}</style></head>
<body>
<div class="header"><div class="header-top"><div class="logo">🍔 Buono Burger</div><div style="display:flex;gap:8px"><button class="lang-btn" onclick="toggleLang()" id="langBtn">RU</button><button class="cart-btn" onclick="showPage('cart')">🛒 <span id="cartTotal">0</span> so'm <span class="cart-count" id="cartCount">0</span></button></div></div></div>
<div id="page-menu" class="page"><div class="cats" id="catList"></div><div class="products" id="productList"></div></div>
<div id="page-cart" class="page hidden"><div class="cart-list" id="cartList"></div><div id="cartSummary"></div></div>
<div id="page-checkout" class="page hidden"><div class="checkout-form"><div class="form-group"><label class="form-label">📞 Telefon raqam</label><input class="form-input" id="phoneInput" type="tel" placeholder="+998 90 123 45 67"></div><div class="form-group"><label class="form-label">📍 Manzil</label><button class="loc-btn" id="locBtn" onclick="getLocation()">📍 <span id="locText">Joylashuvni yuborish</span></button><input class="form-input" id="addressInput" placeholder="Yoki manzilni yozing..." style="margin-top:8px"></div><div class="form-group"><label class="form-label">💳 To'lov usuli</label><div class="payment-opts"><div class="payment-opt selected" onclick="selectPayment('cash',this)"><div class="icon">💵</div><span>Naqd</span></div><div class="payment-opt" onclick="selectPayment('click',this)"><div class="icon">📱</div><span>Click</span></div><div class="payment-opt" onclick="selectPayment('payme',this)"><div class="icon">💳</div><span>Payme</span></div></div></div><div class="form-group"><label class="form-label">💬 Izoh</label><input class="form-input" id="commentInput" placeholder="Qo'shimcha so'rov..."></div><div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)"><div id="checkoutSummary"></div></div><button class="order-btn" id="placeOrderBtn" onclick="placeOrder()">🚀 Buyurtma berish</button></div></div>
<div id="page-orders" class="page hidden"><div class="orders-list" id="ordersList"></div></div>
<div id="page-profile" class="page hidden"><div class="profile-card" id="profileCard"></div></div>
<nav class="bottom-nav"><button class="nav-item active" onclick="showPage('menu')" id="nav-menu"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6m0 5h18v2H3v-2m0 5h18v2H3v-2z"/></svg><span>Menyu</span></button><button class="nav-item" onclick="showPage('cart')" id="nav-cart"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.9 18 9 18h12v-2H9.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.45 5H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg><span>Savat</span></button><button class="nav-item" onclick="showPage('orders');loadOrders()" id="nav-orders"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg><span>Buyurtmalar</span></button><button class="nav-item" onclick="showPage('profile')" id="nav-profile"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profil</span></button></nav>
<div class="toast" id="toast"></div>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.expand();tg.setHeaderColor('#e63946');}
let lang='uz',cart=JSON.parse(localStorage.getItem('cart')||'[]'),menu=[],activeCat=null,selectedPayment='cash',userLat=null,userLng=null;
const ST={new:{uz:'Yangi',ru:'Новый',cls:'s-new'},accepted:{uz:'Qabul',ru:'Принят',cls:'s-accepted'},cooking:{uz:'Tayyorlanmoqda',ru:'Готовится',cls:'s-cooking'},on_way:{uz:"Yo'lda",ru:'В пути',cls:'s-on_way'},delivered:{uz:'Yetkazildi',ru:'Доставлен',cls:'s-delivered'},cancelled:{uz:'Bekor',ru:'Отменён',cls:'s-new'}};
async function init(){const u=tg?.initDataUnsafe?.user;if(u)await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:String(u.id),first_name:u.first_name,last_name:u.last_name||'',username:u.username||''})});loadMenu();updateCartUI();}
function toggleLang(){lang=lang==='uz'?'ru':'uz';document.getElementById('langBtn').textContent=lang==='uz'?'RU':'UZ';if(menu.length)renderMenu();}
async function loadMenu(){menu=await fetch('/api/menu').then(r=>r.json());if(menu.length){activeCat=menu[0].id;renderCats();renderMenu();}}
function renderCats(){document.getElementById('catList').innerHTML=menu.map(c=>'<button class="cat-btn'+(c.id===activeCat?' active':'')+'" onclick="filterCat('+c.id+')">'+c.emoji+' '+c['name_'+lang]+'</button>').join('');}
function filterCat(id){activeCat=id;renderCats();renderMenu();}
function renderMenu(){const cat=menu.find(c=>c.id===activeCat);if(!cat)return;document.getElementById('productList').innerHTML=cat.products.map(p=>{const ic=cart.find(i=>i.id===p.id);return '<div class="product-card"><img class="product-img" src="'+p.image+'" loading="lazy"><div class="product-info"><div class="product-name">'+p['name_'+lang]+'</div><div class="product-desc">'+p['desc_'+lang]+'</div><div class="product-footer"><div class="product-price">'+p.price.toLocaleString()+" so'm</div>"+(ic?'<div class="qty-ctrl"><button onclick="changeQty('+p.id+',-1)">-</button><span>'+ic.qty+'</span><button onclick="changeQty('+p.id+',1)">+</button></div>':'<button class="add-btn" onclick="addToCart('+p.id+')">+</button>')+'</div></div></div>';}).join('');}
function addToCart(id){const p=menu.flatMap(c=>c.products).find(p=>p.id===id);if(!p)return;const ex=cart.find(i=>i.id===id);if(ex)ex.qty++;else cart.push({id:p.id,name_uz:p.name_uz,name_ru:p.name_ru,price:p.price,image:p.image,qty:1});saveCart();updateCartUI();renderMenu();showToast('Added to cart');}
function changeQty(id,d){const idx=cart.findIndex(i=>i.id===id);if(idx<0)return;cart[idx].qty+=d;if(cart[idx].qty<=0)cart.splice(idx,1);saveCart();updateCartUI();renderMenu();if(!document.getElementById('page-cart').classList.contains('hidden'))renderCart();}
function removeFromCart(id){cart=cart.filter(i=>i.id!==id);saveCart();updateCartUI();renderCart();}
function saveCart(){localStorage.setItem('cart',JSON.stringify(cart));}
function cartTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function updateCartUI(){document.getElementById('cartTotal').textContent=cartTotal().toLocaleString();document.getElementById('cartCount').textContent=cartCount();}
function renderCart(){if(!cart.length){document.getElementById('cartList').innerHTML='<div class="empty"><div class="empty-icon">🛒</div><h3>Savat bosh</h3></div>';document.getElementById('cartSummary').innerHTML='';return;}document.getElementById('cartList').innerHTML=cart.map(i=>'<div class="cart-item"><img class="cart-item-img" src="'+i.image+'"><div class="cart-item-info"><div class="cart-item-name">'+i['name_'+lang]+'</div><div class="qty-ctrl"><button onclick="changeQty('+i.id+',-1)">-</button><span>'+i.qty+'</span><button onclick="changeQty('+i.id+',1)">+</button></div><div class="cart-item-price">'+(i.price*i.qty).toLocaleString()+' so\'m</div></div><button class="remove-btn" onclick="removeFromCart('+i.id+')">x</button></div>').join('');document.getElementById('cartSummary').innerHTML='<div class="cart-summary"><div class="summary-row"><span>Mahsulotlar</span><span>'+cartTotal().toLocaleString()+' so\'m</span></div><div class="summary-row"><span>Yetkazib berish</span><span>Bepul</span></div><div class="summary-row total"><span>Jami</span><span>'+cartTotal().toLocaleString()+' so\'m</span></div></div><button class="order-btn" onclick="showPage(\'checkout\');renderCheckout()">Rasmiylashtirish</button>';}
function renderCheckout(){document.getElementById('checkoutSummary').innerHTML='<div style="font-weight:700;margin-bottom:8px">Buyurtma:</div>'+cart.map(i=>'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+i['name_'+lang]+' x'+i.qty+'</span><span>'+(i.price*i.qty).toLocaleString()+" so'm</span></div>").join('')+'<div style="border-top:1px solid #e5e7eb;padding-top:8px;margin-top:4px;display:flex;justify-content:space-between;font-weight:800"><span>Jami</span><span style="color:#e63946">'+cartTotal().toLocaleString()+" so'm</span></div>";}
function selectPayment(m,el){selectedPayment=m;document.querySelectorAll('.payment-opt').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');}
function getLocation(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(pos=>{userLat=pos.coords.latitude;userLng=pos.coords.longitude;document.getElementById('locBtn').classList.add('set');document.getElementById('locText').textContent='Joylashuv aniqlandi';fetch('https://nominatim.openstreetmap.org/reverse?lat='+userLat+'&lon='+userLng+'&format=json').then(r=>r.json()).then(d=>{document.getElementById('addressInput').value=(d.display_name||'').split(',').slice(0,3).join(', ');});});}
async function placeOrder(){const phone=document.getElementById('phoneInput').value.trim();const address=document.getElementById('addressInput').value.trim()||(userLat?'Lokatsiya orqali':'');if(!phone)return showToast('Telefon kiriting');if(!address&&!userLat)return showToast('Manzil kiriting');const btn=document.getElementById('placeOrderBtn');btn.disabled=true;const u=tg?.initDataUnsafe?.user;const res=await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:u?String(u.id):'anon',user_name:u?(u.first_name+' '+(u.last_name||'')).trim():'Mehmon',user_phone:phone,items:cart,total:cartTotal(),address,lat:userLat,lng:userLng,comment:document.getElementById('commentInput').value.trim(),payment:selectedPayment})}).then(r=>r.json());if(res.ok){cart=[];saveCart();updateCartUI();showToast('Buyurtma qabul qilindi!');setTimeout(()=>{showPage('orders');loadOrders();},1200);if(selectedPayment==='click')window.open('https://my.click.uz','_blank');if(selectedPayment==='payme')window.open('https://checkout.paycom.uz','_blank');}else{btn.disabled=false;}}
async function loadOrders(){const u=tg?.initDataUnsafe?.user;if(!u){document.getElementById('ordersList').innerHTML='<div class="empty"><div class="empty-icon">🔒</div><h3>Telegram orqali kiring</h3></div>';return;}const orders=await fetch('/api/orders/my',{headers:{'x-telegram-id':String(u.id)}}).then(r=>r.json());document.getElementById('ordersList').innerHTML=orders.length?orders.map(o=>{const s=ST[o.status]||{uz:o.status,cls:'s-new'};return '<div class="order-card"><div class="order-header"><span class="order-id">#'+o.id+'</span><span class="status-badge '+s.cls+'">'+s[lang]+'</span></div><div class="order-items">'+o.items.map(i=>i.name_uz).join(', ')+'</div><div class="order-total">'+o.total.toLocaleString()+" so'm</div></div>";}).join(''):'<div class="empty"><div class="empty-icon">📋</div><h3>Buyurtma yoq</h3></div>';}
function renderProfile(){const u=tg?.initDataUnsafe?.user;if(!u){document.getElementById('profileCard').innerHTML='<div class="empty"><h3>Telegram orqali kiring</h3></div>';return;}const name=(u.first_name+' '+(u.last_name||'')).trim();document.getElementById('profileCard').innerHTML='<div class="avatar">'+name[0]+'</div><div class="profile-name">'+name+'</div>'+(u.username?'<div class="profile-username">@'+u.username+'</div>':'');}
function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+n).classList.remove('hidden');const el=document.getElementById('nav-'+n);if(el)el.classList.add('active');if(n==='cart')renderCart();if(n==='profile')renderProfile();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
init();
</script></body></html>
